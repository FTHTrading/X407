# docker-compose.deploy.yml
# ECR-referenced stack for AWS deployment (no build: directives)
# Deploy on EC2 delta: i-0e9a24f4902faaa06

x-ecr: &ecr-base
  933629770808.dkr.ecr.us-east-1.amazonaws.com/unykorn-l1

services:
  # ─────────────────────────────────────────────────
  # PostgreSQL — Shared database for all services
  # ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: fth_x402
      POSTGRES_USER: fth_x402_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fth_x402_app -d fth_x402"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────
  # x402 Facilitator — Payment processing
  # ─────────────────────────────────────────────────
  facilitator:
    image: 933629770808.dkr.ecr.us-east-1.amazonaws.com/unykorn-l1/facilitator:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3100"
      DATABASE_URL: postgresql://fth_x402_app:${POSTGRES_PASSWORD}@postgres:5432/fth_x402
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: fth_x402
      PGUSER: fth_x402_app
      PGPASSWORD: ${POSTGRES_PASSWORD}
      FTH_SIGNING_KEY: ${FTH_SIGNING_KEY:?Set FTH_SIGNING_KEY}
      UNYKORN_RPC_URL: http://rpc.l1.unykorn.org:3001
      UNYKORN_RPC_FALLBACK_URL: http://rpc.l1.unykorn.org:3002
      L1_CHAIN_ID: "1337"
      OPERATOR_WEBHOOK_SECRET: ${OPERATOR_WEBHOOK_SECRET:-}
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3100/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────
  # x402 Treasury — Agent fund management
  # ─────────────────────────────────────────────────
  treasury:
    image: 933629770808.dkr.ecr.us-east-1.amazonaws.com/unykorn-l1/treasury:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3200"
      DATABASE_URL: postgresql://fth_x402_app:${POSTGRES_PASSWORD}@postgres:5432/fth_x402
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: fth_x402
      PGUSER: fth_x402_app
      PGPASSWORD: ${POSTGRES_PASSWORD}
      TREASURY_MASTER_KEY: ${TREASURY_MASTER_KEY:-auto-generated}
      UNYKORN_RPC_URL: http://rpc.l1.unykorn.org:3001
      L1_CHAIN_ID: "1337"
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3200/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────
  # Guardian — Army of security daemons
  # ─────────────────────────────────────────────────
  guardian:
    image: 933629770808.dkr.ecr.us-east-1.amazonaws.com/unykorn-l1/guardian:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      facilitator:
        condition: service_healthy
      treasury:
        condition: service_healthy
    environment:
      NODE_ENV: production
      GUARDIAN_PORT: "3300"
      DATABASE_URL: postgresql://fth_x402_app:${POSTGRES_PASSWORD}@postgres:5432/fth_x402
      UNYKORN_RPC_URL: http://rpc.l1.unykorn.org:3001
      FACILITATOR_URL: http://facilitator:3100
      TREASURY_URL: http://treasury:3200
      FACILITATOR_PUBLIC_URL: http://facilitator:3100/health
      L1_CHAIN_ID: "1337"
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      AWS_REGION: us-east-1
    ports:
      - "3300:3300"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3300/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────
  # Grafana — Monitoring dashboards
  # ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:3400/"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3400:3000"

volumes:
  pgdata:
  grafana_data:
